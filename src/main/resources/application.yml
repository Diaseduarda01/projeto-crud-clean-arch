spring:
  application:
    name: vampiros-project-api

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:vampiros_db}
    username: ${DB_USER:vampiro_user}
    password: ${DB_PASS:vampiro_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.springframework: WARN
    gerenciamento.vampiro: INFO
